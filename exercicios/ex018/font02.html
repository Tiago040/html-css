<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'kg';
            src: url('fonts/KGTeacherJordan.otf') format('opentype'), url('fonts/KGTeacherJordan.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;

        }

        h1 {
            font-family: 'kg', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolores similique consequuntur doloremque ut officia ipsum, natus provident animi, repellendus dicta, magni quia esse dolore facilis ab. Aut eveniet quia tenetur.</p>
</body>
</html>
