<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: rgb(255, 4, 4);
            text-decoration: none;
        }

        a:visited {
            color: rgba(25, 10, 222, 0.594);
        }

        a:hover {
            color: black;
            text-decoration: underline;
            text-decoration: none;
        }

        a:active {
            color: yellowgreen;
        }


        a::after {
            content: ' [link]';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="">Repositório GitHub</a></li>
        <li><a href="">Canal do YouTube</a></li>
        <li><a href="">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
